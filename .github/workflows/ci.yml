name: CI

on:
  push:
    branches:
      - main # Triggers only on direct pushes or merges to main (not other branches)
  pull_request:
    branches:
      - main
      - develop # Triggers on any PR targeting main or develop

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:25-jdk
    steps:
      - uses: actions/checkout@v7
      - name: Setup Gradle cache
        uses: actions/cache@v6
        with:
          path: |
            .gradle/wrapper
            .gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Build
        run: ./gradlew --no-daemon --non-interactive compileJava compileTestJava

  # ── Tests + Coverage ──────────────────────────────────────────────────────────
  test:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:25-jdk
      # Mount the host's Docker socket into the build container for Testcontainers
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
      DOCKER_HOST: unix:///var/run/docker.sock
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v7
      - name: Setup Gradle cache
        uses: actions/cache@v6
        with:
          path: |
            .gradle/wrapper
            .gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Run tests
        run: ./gradlew --no-daemon --non-interactive test jacocoTestReport
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            build/test-results/test/**/TEST-*.xml
            build/reports/tests
          retention-days: 7
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: build/reports/jacoco
          retention-days: 7

  # ── Security: Code Vulnerabilities (SpotBugs + FindSecurityBugs) ──────────────
  sast:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:25-jdk
    steps:
      - uses: actions/checkout@v7
      - name: Setup Gradle cache
        uses: actions/cache@v6
        with:
          path: |
            .gradle/wrapper
            .gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Run SpotBugs
        run: ./gradlew --no-daemon --non-interactive spotbugsMain
      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-reports
          path: |
            build/reports/spotbugs/main.html
            build/reports/spotbugs/main.xml
          retention-days: 7

  # ── Security: Dependency Vulnerabilities (OWASP Dependency Check) ────────────
  dependency-check:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:25-jdk
    timeout-minutes: 45
    continue-on-error: true
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
      GRADLE_OPTS: "-Dorg.owasp.dependencycheck.data.directory=${{ github.workspace }}/.gradle/dependency-check-data"
      # NVD API Key retrieved from your GitHub Secrets
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup Gradle cache
        uses: actions/cache@v6
        with:
          path: |
            .gradle/wrapper
            .gradle/caches
            .gradle/dependency-check-data
          key: nvd-cache-${{ github.ref_name }}
          restore-keys: |
            nvd-cache-
      - name: Run Dependency Check
        run: ./gradlew --no-daemon --non-interactive dependencyCheckAnalyze
      - name: Upload Dependency Check reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-reports
          path: |
            build/reports/dependency-check-report.html
            build/reports/dependency-check-report.json
          retention-days: 7

  # ── Quality: Code Complexity (PMD) ───────────────────────────────────────────
  pmd:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:25-jdk
    steps:
      - uses: actions/checkout@v7
      - name: Setup Gradle cache
        uses: actions/cache@v6
        with:
          path: |
            .gradle/wrapper
            .gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Run PMD
        run: ./gradlew --no-daemon --non-interactive pmdMain
      - name: Upload PMD reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pmd-reports
          path: |
            build/reports/pmd/main.html
            build/reports/pmd/main.xml
          retention-days: 7

  # ── Quality: Code Style Conventions (Checkstyle) ─────────────────────────────
  checkstyle:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:25-jdk
    steps:
      - uses: actions/checkout@v7
      - name: Setup Gradle cache
        uses: actions/cache@v6
        with:
          path: |
            .gradle/wrapper
            .gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Run Checkstyle
        run: ./gradlew --no-daemon --non-interactive checkstyleMain
      - name: Upload Checkstyle reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: checkstyle-reports
          path: |
            build/reports/checkstyle/main.html
            build/reports/checkstyle/main.xml
          retention-days: 7
